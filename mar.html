<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMart Supermarket</title>
    <style>
        /* Basic Styling */
        body { font-family: Arial; background-color: #f4f4f4; margin: 0; }
        .container { width: 80%; margin: 0 auto; }
        header { background: green; color: white; padding: 20px 0; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px 0; }
        .product-card { background: white; padding: 15px; border-radius: 5px; text-align: center; }
        .buy-btn { background: black; color: white; padding: 10px; text-decoration: none; display: inline-block; margin-top: 10px; border-radius: 50px;}
  </style>
</head>
<body>
    <header><h1>FreshMart Supermarket</h1></header>
    <main class="container">
        <h2>Featured Products</h2>
         
        <div class="product-grid">
            <div class="product-card">
            <h3>Apple</h3> 
                <p class="price">$2.99/kg</p>
                <a href="#" class="buy-btn">Add</a></div>
            <div class="product-card"><h3>Milk</h3><p>$2.50</p><a href="#" class="buy-btn">Add to cart</a></div>
        </div>
    </main>
</body>
</html>
