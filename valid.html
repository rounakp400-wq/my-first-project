<!DOCTYPE html>  
<html>  
<head>  
    <title>Simple Page</title>
</head>  
<body>  
     <h2>Simple Calculator</h2>  
  
    <label for="num1"><strong>Number 1: </strong></label><input type="number" id="num1"> 
    <br><br>  
    <label for="num2"><strong>Number 2: </strong></label><input type="number" id="num2"> <br><br>  
   <label for="choose"><strong>Choose these: </strong></label><button onclick="add()">Add (+)</button> 
      <button onclick="subtract()">Subtract (-)</button>  
    <button onclick="multiply()">Multiply (×)</button>  
    <button onclick="divide()">Divide (÷)</button>
        
    <h3 id="result"></h3>  
  
    <script>  
        function add() {  
            let a = parseFloat(document.getElementById("num1").value);  
            let b = parseFloat(document.getElementById("num2").value);  
            document.getElementById("result").innerHTML = "Result: " + (a + b);  
        }  
  
        function subtract() {  
            let a = parseFloat(document.getElementById("num1").value);  
            let b = parseFloat(document.getElementById("num2").value);  
            document.getElementById("result").innerHTML = "Result: " + (a - b);  
        }  
  
        function multiply() {  
            let a = parseFloat(document.getElementById("num1").value);  
            let b = parseFloat(document.getElementById("num2").value);
            document.getElementById("result").innerHTML = "Result: " + (a * b);  
        } 
  
        function divide() {  
            let a = parseFloat(document.getElementById("num1").value);  
            let b = parseFloat(document.getElementById("num2").value);  
  
            if (b == 0) {  
                document.getElementById("result").innerHTML = "Cannot divide by zero";  
            } else {  
                document.getElementById("result").innerHTML = "Result: " + (a / b);  
            }  
        }  
    </script> 
</body>  
</html>
